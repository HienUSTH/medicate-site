<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Người dùng • Medicate</title>
  <link rel="icon" href="assets/img/favicon.png">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800">
  <main class="max-w-md mx-auto px-4 py-12">
    <h1 class="text-2xl md:text-3xl font-semibold text-center">Người dùng</h1>

    <div id="authTabs" class="mt-8 rounded-2xl border p-6 bg-white shadow-sm">
      <div class="flex gap-4">
        <button data-tab="signup" class="auth-tab px-4 py-2 rounded-lg bg-sky-600 text-white">Đăng ký</button>
        <button data-tab="signin" class="auth-tab px-4 py-2 rounded-lg border">Đăng nhập</button>
      </div>

      <div class="mt-6">
        <form id="signupForm" class="space-y-4" autocomplete="off">
          <div>
            <label class="block text-sm mb-1" for="su_username">Tên người dùng</label>
            <input id="su_username" name="username" type="text" class="w-full rounded-xl border px-3 py-2" placeholder="vd: ngoc_anh" required />
          </div>
          <div>
            <label class="block text-sm mb-1" for="su_email">Email</label>
            <input id="su_email" name="email" type="email" class="w-full rounded-xl border px-3 py-2" placeholder="vd: ten@medicate.vn" required />
          </div>
          <div>
            <label class="block text-sm mb-1" for="su_password">Mật khẩu</label>
            <input id="su_password" name="password" type="password" class="w-full rounded-xl border px-3 py-2" placeholder="••••••••" minlength="6" required />
          </div>
          <button type="submit" class="w-full rounded-xl bg-sky-600 text-white px-4 py-2">Tạo tài khoản</button>
          <p id="signupMsg" class="text-xs"></p>
        </form>

        <form id="signinForm" class="space-y-4 hidden" autocomplete="off">
          <div>
            <label class="block text-sm mb-1" for="si_email">Email</label>
            <input id="si_email" name="email" type="email" class="w-full rounded-xl border px-3 py-2" required />
          </div>
          <div>
            <label class="block text-sm mb-1" for="si_password">Mật khẩu</label>
            <input id="si_password" name="password" type="password" class="w-full rounded-xl border px-3 py-2" required />
          </div>
          <button type="submit" class="w-full rounded-xl bg-sky-600 text-white px-4 py-2">Đăng nhập</button>
          <p id="signinMsg" class="text-xs"></p>
        </form>
      </div>
    </div>

    <div class="mt-6 rounded-2xl border bg-white p-4 text-sm">
      <div class="font-medium">Trạng thái debug</div>
      <p class="mt-2 text-slate-600">User hiện tại: <span id="debugUser">chưa đăng nhập</span></p>
      <p class="text-slate-600">Session: <span id="debugSession">chưa có</span></p>
      <button id="logoutBtn" type="button" class="mt-3 rounded-lg border px-3 py-2 text-sm hidden">Đăng xuất</button>
    </div>
  </main>

  <script src="assets/js/nav.js"></script>
  <script src="assets/js/status-watcher.js"></script>
  <script src="assets/js/reminder-watcher.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://kbdqkvcmfkuthlbbnaac.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtiZHFrdmNtZmt1dGhsYmJuYWFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0OTczNzIsImV4cCI6MjA5MDA3MzM3Mn0.8dDVYCZyvTYRR7pkeleTiW1vv9ktNiPD8dml0DU4HDw';

    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const params = new URLSearchParams(window.location.search);
    const currentTab = params.get('tab') || 'signup';
    const signupForm = document.getElementById('signupForm');
    const signinForm = document.getElementById('signinForm');
    const tabBtns = document.querySelectorAll('.auth-tab');
    const logoutBtn = document.getElementById('logoutBtn');
    const debugUser = document.getElementById('debugUser');
    const debugSession = document.getElementById('debugSession');

    function switchTab(tab) {
      if (tab === 'signup') {
        signupForm.classList.remove('hidden');
        signinForm.classList.add('hidden');
      } else {
        signinForm.classList.remove('hidden');
        signupForm.classList.add('hidden');
      }

      tabBtns.forEach(btn => {
        if (btn.dataset.tab === tab) {
          btn.classList.add('bg-sky-600', 'text-white');
          btn.classList.remove('border');
        } else {
          btn.classList.remove('bg-sky-600', 'text-white');
          btn.classList.add('border');
        }
      });
    }

    switchTab(currentTab);
    tabBtns.forEach(btn => btn.addEventListener('click', () => switchTab(btn.dataset.tab)));

    async function refreshDebug() {
      const { data, error } = await sb.auth.getSession();
      if (error) {
        debugUser.textContent = 'lỗi lấy session';
        debugSession.textContent = error.message;
        logoutBtn.classList.add('hidden');
        return;
      }

      const session = data.session;
      if (!session) {
        debugUser.textContent = 'chưa đăng nhập';
        debugSession.textContent = 'chưa có';
        logoutBtn.classList.add('hidden');
        return;
      }

      debugUser.textContent = session.user.email || session.user.id;
      debugSession.textContent = 'đã có';
      logoutBtn.classList.remove('hidden');
    }

    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('signupMsg');
      msg.textContent = 'Đang tạo tài khoản...';
      msg.className = 'text-xs text-slate-500';

      const username = e.target.username.value.trim();
      const email = e.target.email.value.trim();
      const password = e.target.password.value;

      const { data, error } = await sb.auth.signUp({
        email,
        password,
        options: {
          data: { username }
        }
      });

      if (error) {
        msg.textContent = error.message || 'Đăng ký thất bại';
        msg.className = 'text-xs text-red-500';
        console.error('SIGNUP_ERROR', error);
        return;
      }

      console.log('SIGNUP_OK', data);

      if (data.session) {
        msg.textContent = 'Đăng ký thành công. Hệ thống đã tạo session, bạn có thể dùng ngay.';
      } else {
        msg.textContent = 'Đăng ký thành công. Nếu bạn đang bật Confirm Email trong Supabase, hãy xác nhận email rồi đăng nhập.';
      }

      msg.className = 'text-xs text-green-600';
      e.target.reset();
      await refreshDebug();
      switchTab('signin');
    });

    signinForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('signinMsg');
      msg.textContent = 'Đang đăng nhập...';
      msg.className = 'text-xs text-slate-500';

      const email = e.target.email.value.trim();
      const password = e.target.password.value;

      const { data, error } = await sb.auth.signInWithPassword({
        email,
        password,
      });

      if (error) {
        msg.textContent = error.message || 'Đăng nhập thất bại';
        msg.className = 'text-xs text-red-500';
        console.error('SIGNIN_ERROR', error);
        return;
      }

      console.log('SIGNIN_OK', data);
      msg.textContent = 'Đăng nhập thành công. Đang chuyển...';
      msg.className = 'text-xs text-green-600';
      await refreshDebug();

      setTimeout(() => {
        window.location.href = 'index.html';
      }, 700);
    });

    logoutBtn.addEventListener('click', async () => {
      await sb.auth.signOut();
      await refreshDebug();
      switchTab('signin');
    });

    sb.auth.onAuthStateChange(async () => {
      await refreshDebug();
    });

    refreshDebug();
  </script>
</body>
</html>

<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Người dùng • Medicate</title>
  <link rel="icon" href="assets/img/favicon.png">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800">
  <main class="max-w-md mx-auto px-4 py-12">
    <h1 class="text-2xl md:text-3xl font-semibold text-center">Người dùng</h1>

    <div id="authTabs" class="mt-8 rounded-2xl border p-6 bg-white shadow-sm">
      <div class="flex gap-4">
        <button type="button" data-tab="signup" class="auth-tab px-4 py-2 rounded-lg bg-sky-600 text-white">Đăng ký</button>
        <button type="button" data-tab="signin" class="auth-tab px-4 py-2 rounded-lg border">Đăng nhập</button>
      </div>

      <div class="mt-6">
        <form id="signupForm" class="space-y-4" autocomplete="off" novalidate>
          <div>
            <label class="block text-sm mb-1" for="su_username">Tên người dùng</label>
            <input id="su_username" name="username" type="text" class="w-full rounded-xl border px-3 py-2" required />
          </div>
          <div>
            <label class="block text-sm mb-1" for="su_email">Email</label>
            <input id="su_email" name="email" type="email" class="w-full rounded-xl border px-3 py-2" required />
          </div>
          <div>
            <label class="block text-sm mb-1" for="su_password">Mật khẩu</label>
            <input id="su_password" name="password" type="password" class="w-full rounded-xl border px-3 py-2" minlength="6" required />
          </div>
          <button id="signupBtn" type="submit" class="w-full rounded-xl bg-sky-600 text-white px-4 py-2 disabled:opacity-60">Tạo tài khoản</button>
          <p id="signupMsg" class="text-xs"></p>
        </form>

        <form id="signinForm" class="space-y-4 hidden" autocomplete="off" novalidate>
          <div>
            <label class="block text-sm mb-1" for="si_email">Email</label>
            <input id="si_email" name="email" type="email" class="w-full rounded-xl border px-3 py-2" required />
          </div>
          <div>
            <label class="block text-sm mb-1" for="si_password">Mật khẩu</label>
            <input id="si_password" name="password" type="password" class="w-full rounded-xl border px-3 py-2" required />
          </div>
          <button id="signinBtn" type="submit" class="w-full rounded-xl bg-sky-600 text-white px-4 py-2 disabled:opacity-60">Đăng nhập</button>
          <p id="signinMsg" class="text-xs"></p>
        </form>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://kbdqkvcmfkuthlbbnaac.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtiZHFrdmNtZmt1dGhsYmJuYWFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0OTczNzIsImV4cCI6MjA5MDA3MzM3Mn0.8dDVYCZyvTYRR7pkeleTiW1vv9ktNiPD8dml0DU4HDw';

    const signupForm = document.getElementById('signupForm');
    const signinForm = document.getElementById('signinForm');
    const signupBtn = document.getElementById('signupBtn');
    const signinBtn = document.getElementById('signinBtn');
    const signupMsg = document.getElementById('signupMsg');
    const signinMsg = document.getElementById('signinMsg');
    const tabBtns = document.querySelectorAll('.auth-tab');

    let sb = null;

    function setMessage(el, text, tone = 'neutral') {
      const classes = {
        neutral: 'text-xs text-slate-500',
        success: 'text-xs text-green-600',
        error: 'text-xs text-red-500'
      };
      el.textContent = text;
      el.className = classes[tone] || classes.neutral;
    }

    function setLoading(type, isLoading) {
      if (type === 'signup') {
        signupBtn.disabled = isLoading;
        signupBtn.textContent = isLoading ? 'Đang tạo tài khoản...' : 'Tạo tài khoản';
      } else {
        signinBtn.disabled = isLoading;
        signinBtn.textContent = isLoading ? 'Đang đăng nhập...' : 'Đăng nhập';
      }
    }

    function switchTab(tab) {
      if (tab === 'signup') {
        signupForm.classList.remove('hidden');
        signinForm.classList.add('hidden');
      } else {
        signinForm.classList.remove('hidden');
        signupForm.classList.add('hidden');
      }

      tabBtns.forEach(btn => {
        if (btn.dataset.tab === tab) {
          btn.classList.add('bg-sky-600', 'text-white');
          btn.classList.remove('border');
        } else {
          btn.classList.remove('bg-sky-600', 'text-white');
          btn.classList.add('border');
        }
      });

      const url = new URL(window.location.href);
      url.searchParams.set('tab', tab);
      history.replaceState({}, '', url);
    }

    function validateSignupForm() {
      const username = signupForm.username.value.trim();
      const email = signupForm.email.value.trim();
      const password = signupForm.password.value;

      if (!username) return 'Bạn chưa nhập tên người dùng';
      if (!email) return 'Bạn chưa nhập email';
      if (!password) return 'Bạn chưa nhập mật khẩu';
      if (password.length < 6) return 'Mật khẩu phải có ít nhất 6 ký tự';
      return null;
    }

    function validateSigninForm() {
      const email = signinForm.email.value.trim();
      const password = signinForm.password.value;

      if (!email) return 'Bạn chưa nhập email';
      if (!password) return 'Bạn chưa nhập mật khẩu';
      return null;
    }

    function wireEnterHandling() {
      document.addEventListener('keydown', (e) => {
        if (e.key !== 'Enter') return;
        const target = e.target;
        if (!(target instanceof HTMLElement)) return;
        const form = target.closest('form');
        if (!form) return;
        e.preventDefault();
        e.stopPropagation();
        form.requestSubmit();
      });
    }

    function initSupabase() {
      sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: {
          persistSession: true,
          autoRefreshToken: true,
          detectSessionInUrl: true
        }
      });
    }

    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      setMessage(signupMsg, '', 'neutral');

      const validationError = validateSignupForm();
      if (validationError) {
        setMessage(signupMsg, validationError, 'error');
        return;
      }

      setLoading('signup', true);
      setMessage(signupMsg, 'Đang tạo tài khoản...', 'neutral');

      try {
        const username = signupForm.username.value.trim();
        const email = signupForm.email.value.trim();
        const password = signupForm.password.value;

        const { data, error } = await sb.auth.signUp({
          email,
          password,
          options: {
            data: { username }
          }
        });

        if (error) throw error;

        if (data.session) {
          setMessage(signupMsg, 'Đăng ký thành công. Bạn có thể đăng nhập ngay.', 'success');
        } else {
          setMessage(signupMsg, 'Đăng ký thành công. Hãy kiểm tra email nếu bạn đang bật xác nhận email.', 'success');
        }

        signupForm.reset();
        switchTab('signin');
      } catch (error) {
        setMessage(signupMsg, error?.message || 'Đăng ký thất bại', 'error');
      } finally {
        setLoading('signup', false);
      }
    });

    signinForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      setMessage(signinMsg, '', 'neutral');

      const validationError = validateSigninForm();
      if (validationError) {
        setMessage(signinMsg, validationError, 'error');
        return;
      }

      setLoading('signin', true);
      setMessage(signinMsg, 'Đang đăng nhập...', 'neutral');

      try {
        const email = signinForm.email.value.trim();
        const password = signinForm.password.value;

        const { error } = await sb.auth.signInWithPassword({
          email,
          password
        });

        if (error) throw error;

        setMessage(signinMsg, 'Đăng nhập thành công. Đang chuyển...', 'success');

        setTimeout(() => {
          window.location.href = 'index.html';
        }, 700);
      } catch (error) {
        setMessage(signinMsg, error?.message || 'Đăng nhập thất bại', 'error');
      } finally {
        setLoading('signin', false);
      }
    });

    tabBtns.forEach(btn => {
      btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });

    (function boot() {
      wireEnterHandling();
      const params = new URLSearchParams(window.location.search);
      switchTab(params.get('tab') || 'signup');
      initSupabase();
    })();
  </script>
</body>
</html>
